{% extends 'base.html' %}
{% block content %}
<div class="form-container">
    <h2>Регистрация</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in forms %}
        <div class="form-group">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}
        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
</div>
{% endblock %}
